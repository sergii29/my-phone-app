<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Warsaw Courier Call</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .user-item { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        button { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .status-text { color: #888; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>Кто в сети:</h2>
    <div id="status" class="status-text">Подключение к системе...</div>
    <div id="users-list"></div>

    <audio id="remoteAudio" autoplay></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChrQMyO2soPgoEHq_f3aYs5Cs19q3sWEk",
            authDomain: "warszawa-courier.firebaseapp.com",
            databaseURL: "https://warszawa-courier-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "warszawa-courier",
            storageBucket: "warszawa-courier.firebasestorage.app",
            messagingSenderId: "295860613508",
            appId: "1:295860613508:web:86fe8364377d6875612dd1",
            measurementId: "G-TGSCHBVLX2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Создаем случайный ID для сессии
        const myId = 'User-' + Math.floor(Math.random() * 9000);
        const peer = new Peer(myId);

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Вы в сети (" + id + ")";
            // Регистрируемся в базе
            const userRef = db.ref('online_calls/' + id);
            userRef.set(true);
            userRef.onDisconnect().remove();
        });

        // Слушаем список из базы
        db.ref('online_calls').on('value', (snapshot) => {
            const listDiv = document.getElementById('users-list');
            listDiv.innerHTML = '';
            snapshot.forEach((child) => {
                const userId = child.key;
                if (userId !== myId) {
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `<span>Абонент: ${userId}</span> <button onclick="makeCall('${userId}')">ПОЗВОНИТЬ</button>`;
                    listDiv.appendChild(div);
                }
            });
        });

        // Входящий звонок
        peer.on('call', (call) => {
            if(confirm("Вам звонят! Ответить?")) {
                navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                    call.answer(stream);
                    call.on('stream', remStream => {
                        document.getElementById('remoteAudio').srcObject = remStream;
                    });
                });
            }
        });

        // Исходящий звонок
        function makeCall(targetId) {
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                const call = peer.call(targetId, stream);
                call.on('stream', remStream => {
                    document.getElementById('remoteAudio').srcObject = remStream;
                });
            });
        }
    </script>
</body>
</html>
