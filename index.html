<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Линия Связи</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; padding: 20px; margin: 0; }
        .status-area { background: #1a1a1a; padding: 15px; border-radius: 15px; color: #0f0; margin-bottom: 20px; border: 1px solid #333; font-weight: bold; }
        .btn-call { background: #28a745; width: 100%; padding: 30px; border-radius: 20px; font-size: 1.8rem; font-weight: bold; border: none; color: white; margin-top: 15px; }
        .btn-accept { background: #28a745; width: 100%; padding: 40px; border-radius: 25px; font-size: 2.5rem; border: none; color: white; }
        #incoming-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; padding-top: 80px; z-index: 9999; }
        .info { color: #888; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2>СВЯЗЬ</h2>
        <div id="status" class="status-area">ПОДКЛЮЧЕНИЕ...</div>
        <div id="users-list">Поиск собеседника...</div>
        <button style="margin-top:40px; background:#333; color:white; border:none; padding:15px 25px; border-radius:12px;" onclick="location.reload()">ОБНОВИТЬ</button>
        <p class="info">Если висит долго — включи VPN</p>
    </div>

    <div id="incoming-screen">
        <h1 style="font-size: 3rem; color:#0f0;">ВЫЗОВ!</h1>
        <button class="btn-accept" onclick="acceptCall()">ОТВЕТИТЬ</button>
    </div>

    <div id="active-call-ui" style="display:none;">
        <h1 style="color:#0f0; font-size:2.5rem;">В ЭФИРЕ</h1>
        <button style="background:#d9534f; width:100%; padding:35px; border-radius:20px; color:white; font-size:1.8rem; border:none; margin-top:40px;" onclick="location.reload()">ЗАВЕРШИТЬ</button>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>
    <audio id="ringtone" loop><source src="https://www.soundjay.com/phone/phone-calling-1.mp3" type="audio/mpeg"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChrQMyO2soPgoEHq_f3aYs5Cs19q3sWEk",
            authDomain: "warszawa-courier.firebaseapp.com",
            databaseURL: "https://warszawa-courier-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "warszawa-courier",
            storageBucket: "warszawa-courier.firebasestorage.app",
            messagingSenderId: "295860613508",
            appId: "1:295860613508:web:86fe8364377d6875612dd1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const isMobile = /iPhone|Android/i.test(navigator.userAgent);
        const myRole = isMobile ? 'MAMA' : 'SYN';
        
        // Создаем Peer с уникальным ID, чтобы не было конфликтов при перезагрузке
        const peer = new Peer(myRole + '-' + Math.floor(Math.random() * 99999), {
            config: {'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]}
        });

        const audioEl = document.getElementById('remoteAudio');
        const ringtone = document.getElementById('ringtone');
        let activeCall = null;

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Я В СЕТИ";
            const userRef = db.ref('online_calls/' + id);
            userRef.set({ role: myRole, time: Date.now() });
            userRef.onDisconnect().remove();
        });

        db.ref('online_calls').on('value', (snapshot) => {
            const listDiv = document.getElementById('users-list');
            listDiv.innerHTML = '';
            let count = 0;
            snapshot.forEach((child) => {
                const userData = child.val();
                if (userData.role !== myRole) {
                    count++;
                    const btn = document.createElement('button');
                    btn.className = 'btn-call';
                    btn.innerText = (userData.role === 'SYN') ? 'ПОЗВОНИТЬ СЫНУ' : 'ПОЗВОНИТЬ МАМЕ';
                    btn.onclick = () => makeCall(child.key);
                    listDiv.appendChild(btn);
                }
            });
            if (count === 0) listDiv.innerHTML = "Ждем второго абонента...";
        });

        peer.on('call', (call) => {
            activeCall = call;
            ringtone.play().catch(() => {});
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('incoming-screen').style.display = 'block';
        });

        function acceptCall() {
            ringtone.pause();
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                activeCall.answer(stream);
                showActiveUI();
                activeCall.on('stream', s => { audioEl.srcObject = s; });
            });
        }

        function makeCall(targetId) {
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                activeCall = peer.call(targetId, stream);
                showActiveUI();
                activeCall.on('stream', s => { audioEl.srcObject = s; });
            });
        }

        function showActiveUI() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('incoming-screen').style.display = 'none';
            document.getElementById('active-call-ui').style.display = 'block';
        }

        peer.on('error', (err) => {
            console.error(err);
            if (err.type === 'network') {
                document.getElementById('status').innerText = "СЕТЬ ЗАБЛОКИРОВАНА (НУЖЕН VPN)";
            }
        });
    </script>
</body>
</html>
