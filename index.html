<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Связь</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        button { width: 100%; padding: 20px; border-radius: 15px; border: none; font-size: 1.2rem; cursor: pointer; color: white; font-weight: bold; margin: 10px 0; }
        .blue-btn { background: #007bff; }
        .green-btn { background: #28a745; }
        #status { color: #888; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>КТО ВЫ?</h2>
        <button class="blue-btn" onclick="init('pasha')">Я — ПАША</button>
        <button class="green-btn" onclick="init('drug')">Я — ДРУГ</button>
    </div>

    <div id="call-screen" style="display:none;">
        <div class="card">
            <h3 id="user-info"></h3>
            <button class="green-btn" onclick="makeCall()">ПОЗВОНИТЬ</button>
        </div>
        <div id="status">Подключение к сети...</div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script>
        let myId, targetId, peer;

        function init(name) {
            myId = name;
            targetId = (name === 'pasha') ? 'drug' : 'pasha';
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('call-screen').style.display = 'block';
            document.getElementById('user-info').innerText = "Вы зашли как: " + myId.toUpperCase();
            
            peer = new Peer(myId);

            peer.on('open', () => {
                document.getElementById('status').innerText = "В сети. Можно звонить.";
            });

            peer.on('call', (call) => {
                if(confirm("Входящий звонок! Ответить?")) {
                    navigator.mediaDevices.getUserMedia({video: false, audio: true}).then((stream) => {
                        call.answer(stream);
                        call.on('stream', (remoteStream) => {
                            document.getElementById('remoteAudio').srcObject = remoteStream;
                            document.getElementById('status').innerText = "Разговор...";
                        });
                    });
                }
            });
        }

        function makeCall() {
            document.getElementById('status').innerText = "Звоню...";
            navigator.mediaDevices.getUserMedia({video: false, audio: true}).then((stream) => {
                const call = peer.call(targetId, stream);
                call.on('stream', (remoteStream) => {
                    document.getElementById('remoteAudio').srcObject = remoteStream;
                    document.getElementById('status').innerText = "Разговор...";
                });
            });
        }
    </script>
</body>
</html>
