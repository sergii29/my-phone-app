<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Warszawa Call</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; padding: 20px; margin: 0; }
        .btn-call { background: #28a745; width: 100%; padding: 30px; border-radius: 20px; font-size: 1.8rem; font-weight: bold; border: none; color: white; margin-top: 20px; }
        .btn-hangup { background: #d9534f; width: 100%; padding: 25px; border-radius: 20px; font-size: 1.5rem; font-weight: bold; border: none; color: white; margin-top: 20px; }
        .btn-accept { background: #28a745; width: 100%; padding: 40px; border-radius: 20px; font-size: 2.5rem; border: none; color: white; margin-bottom: 20px; }
        #incoming-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; padding-top: 100px; z-index: 999; }
        .status-area { background: #111; padding: 10px; border-radius: 10px; color: #0f0; font-size: 1rem; margin-bottom: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2>СВЯЗЬ С СЫНОМ</h2>
        <div id="status" class="status-area">ПОДКЛЮЧЕНИЕ...</div>
        <div id="users-list">Поиск...</div>
    </div>

    <div id="incoming-screen">
        <h1 style="font-size: 3rem;">СЫН ЗВОНИТ!</h1>
        <button class="btn-accept" onclick="acceptCall()">ОТВЕТИТЬ</button>
        <button style="background:#444; color:white; border:none; padding:15px; border-radius:10px; width:80%;" onclick="declineCall()">СБРОСИТЬ</button>
    </div>

    <div id="active-call-ui" style="display:none;">
        <h1 style="color:#0f0;">ГОВОРИ!</h1>
        <button class="btn-hangup" onclick="endCall()">ПОЛОЖИТЬ ТРУБКУ</button>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>
    <audio id="ringtone" loop><source src="https://www.soundjay.com/phone/phone-calling-1.mp3" type="audio/mpeg"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChrQMyO2soPgoEHq_f3aYs5Cs19q3sWEk",
            authDomain: "warszawa-courier.firebaseapp.com",
            databaseURL: "https://warszawa-courier-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "warszawa-courier",
            storageBucket: "warszawa-courier.firebasestorage.app",
            messagingSenderId: "295860613508",
            appId: "1:295860613508:web:86fe8364377d6875612dd1",
            measurementId: "G-TGSCHBVLX2"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Постоянный ID для мамы (чтобы база не путалась)
        const isMom = /iPhone|Android/i.test(navigator.userAgent);
        const myId = isMom ? 'MAMA' : 'SYN'; 
        
        const peer = new Peer(myId);
        const audioEl = document.getElementById('remoteAudio');
        const ringtone = document.getElementById('ringtone');
        let currentCall = null;

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Я В СЕТИ";
            // Записываемся в базу принудительно
            db.ref('online_calls/' + id).set({ online: true, time: Date.now() });
            db.ref('online_calls/' + id).onDisconnect().remove();
        });

        // Каждую секунду проверяем, кто пришел
        db.ref('online_calls').on('value', (snapshot) => {
            const listDiv = document.getElementById('users-list');
            let html = '';
            snapshot.forEach((child) => {
                if (child.key !== myId) {
                    const label = (child.key === 'SYN') ? 'ПОЗВОНИТЬ СЫНУ' : 'ПОЗВОНИТЬ МАМЕ';
                    html += `<button class="btn-call" onclick="makeCall('${child.key}')">${label}</button>`;
                }
            });
            listDiv.innerHTML = html || "Ждем, когда второй зайдет...";
        });

        peer.on('call', (call) => {
            currentCall = call;
            ringtone.play().catch(() => {});
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('incoming-screen').style.display = 'block';
        });

        function acceptCall() {
            ringtone.pause();
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                currentCall.answer(stream);
                showActiveUI();
                currentCall.on('stream', s => { audioEl.srcObject = s; });
            });
        }

        function makeCall(tid) {
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                currentCall = peer.call(tid, stream);
                showActiveUI();
                currentCall.on('stream', s => { audioEl.srcObject = s; });
            });
        }

        function declineCall() { ringtone.pause(); if(currentCall) currentCall.close(); resetUI(); }
        function endCall() { if(currentCall) currentCall.close(); resetUI(); }
        function showActiveUI() { document.getElementById('main-ui').style.display = 'none'; document.getElementById('incoming-screen').style.display = 'none'; document.getElementById('active-call-ui').style.display = 'block'; }
        function resetUI() { document.getElementById('main-ui').style.display = 'block'; document.getElementById('incoming-screen').style.display = 'none'; document.getElementById('active-call-ui').style.display = 'none'; }
    </script>
</body>
</html>
