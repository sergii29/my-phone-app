<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Связь</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; padding: 20px; margin: 0; overflow: hidden; }
        .status-area { background: #1a1a1a; padding: 15px; border-radius: 15px; color: #0f0; margin-bottom: 20px; border: 1px solid #333; font-weight: bold; }
        .btn-call { background: #28a745; width: 100%; padding: 30px; border-radius: 20px; font-size: 1.8rem; font-weight: bold; border: none; color: white; margin-top: 15px; }
        .btn-accept { background: #28a745; width: 100%; padding: 40px; border-radius: 25px; font-size: 2.5rem; border: none; color: white; }
        #incoming-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; padding-top: 80px; z-index: 9999; }
        .loader { color: #555; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2 style="color: #ccc;">ЛИНИЯ СВЯЗИ</h2>
        <div id="status" class="status-area">ЗАПУСК...</div>
        <div id="users-list">Ищем маму/сына...</div>
        <button style="margin-top:40px; background:#222; color:#888; border:1px solid #444; padding:12px 20px; border-radius:12px; font-size: 1rem;" onclick="location.reload()">ПЕРЕЗАГРУЗИТЬ</button>
        <div class="loader">Если не грузит 10 сек — включи VPN</div>
    </div>

    <div id="incoming-screen">
        <h1 style="font-size: 3rem; color:#0f0;">ЗВОНОК!</h1>
        <button class="btn-accept" onclick="acceptCall()">ОТВЕТИТЬ</button>
    </div>

    <div id="active-call-ui" style="display:none;">
        <h1 style="color:#0f0; font-size:2.5rem; margin-top: 50px;">В ЭФИРЕ</h1>
        <button style="background:#d9534f; width:90%; padding:35px; border-radius:20px; color:white; font-size:1.8rem; border:none; margin-top: 50px;" onclick="location.reload()">СБРОСИТЬ</button>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>
    <audio id="ringtone" loop><source src="https://www.soundjay.com/phone/phone-calling-1.mp3" type="audio/mpeg"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChrQMyO2soPgoEHq_f3aYs5Cs19q3sWEk",
            authDomain: "warszawa-courier.firebaseapp.com",
            databaseURL: "https://warszawa-courier-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "warszawa-courier",
            storageBucket: "warszawa-courier.firebasestorage.app",
            messagingSenderId: "295860613508",
            appId: "1:295860613508:web:86fe8364377d6875612dd1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myRole = /iPhone|Android/i.test(navigator.userAgent) ? 'MAMA' : 'SYN';

        // Создаем Peer с настройками обхода NAT (STUN сервера)
        const peer = new Peer(myRole, {
            config: {'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]},
            debug: 1
        });

        const audioEl = document.getElementById('remoteAudio');
        const ringtone = document.getElementById('ringtone');
        let activeCall = null;

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Я В СЕТИ";
            // Чистим старые записи и ставим себя
            const userRef = db.ref('online_calls/' + id);
            userRef.set({ active: true });
            userRef.onDisconnect().remove();
        });

        // Слушаем базу
        db.ref('online_calls').on('value', (snapshot) => {
            const listDiv = document.getElementById('users-list');
            let found = false;
            listDiv.innerHTML = '';
            snapshot.forEach((child) => {
                if (child.key !== myRole) {
                    found = true;
                    const btnLabel = (child.key === 'SYN') ? 'ПОЗВОНИТЬ СЫНУ' : 'ПОЗВОНИТЬ МАМЕ';
                    const btn = document.createElement('button');
                    btn.className = 'btn-call';
                    btn.innerText = btnLabel;
                    btn.onclick = () => makeCall(child.key);
                    listDiv.appendChild(btn);
                }
            });
            if (!found) listDiv.innerHTML = "<p style='color:#666;'>Второй абонент не в сети</p>";
        });

        peer.on('call', (call) => {
            activeCall = call;
            ringtone.play().catch(() => {});
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('incoming-screen').style.display = 'block';
        });

        function acceptCall() {
            ringtone.pause();
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                activeCall.answer(stream);
                showActiveUI();
                activeCall.on('stream', s => { audioEl.srcObject = s; });
            });
        }

        function makeCall(targetId) {
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                activeCall = peer.call(targetId, stream);
                showActiveUI();
                activeCall.on('stream', s => { audioEl.srcObject = s; });
            });
        }

        function showActiveUI() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('incoming-screen').style.display = 'none';
            document.getElementById('active-call-ui').style.display = 'block';
        }

        // Если возникают ошибки - просто перезагружаем через 3 сек
        peer.on('error', () => {
            document.getElementById('status').innerText = "ОШИБКА. ПЕРЕЗАПУСК...";
            setTimeout(() => location.reload(), 3000);
        });
    </script>
</body>
</html>
