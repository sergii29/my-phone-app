<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Call App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 1.2rem; cursor: pointer; color: white; font-weight: bold; }
        .pasha-btn { background: #007bff; margin-bottom: 10px; }
        .drug-btn { background: #28a745; }
        #status { color: #888; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>WHO ARE YOU?</h2>
    <div id="setup">
        <button class="pasha-btn" onclick="start('pasha')">I AM PASHA</button>
        <button class="drug-btn" onclick="start('drug')">I AM FRIEND</button>
    </div>

    <div id="main" style="display:none;">
        <div class="card">
            <p id="info"></p>
            <button class="drug-btn" id="callBtn" onclick="makeCall()">CALL PARTNER</button>
        </div>
        <div id="status">Ready</div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script>
        let myId, targetId, peer;

        function start(name) {
            myId = name;
            targetId = (name === 'pasha') ? 'drug' : 'pasha';
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            document.getElementById('info').innerText = "Logged in as: " + myId.toUpperCase();
            
            peer = new Peer(myId);

            peer.on('call', (call) => {
                navigator.mediaDevices.getUserMedia({video: false, audio: true}).then((stream) => {
                    call.answer(stream);
                    call.on('stream', (remoteStream) => {
                        document.getElementById('remoteAudio').srcObject = remoteStream;
                        document.getElementById('status').innerText = "Connected!";
                    });
                });
            });
        }

        function makeCall() {
            document.getElementById('status').innerText = "Calling " + targetId + "...";
            navigator.mediaDevices.getUserMedia({video: false, audio: true}).then((stream) => {
                const call = peer.call(targetId, stream);
                call.on('stream', (remoteStream) => {
                    document.getElementById('remoteAudio').srcObject = remoteStream;
                    document.getElementById('status').innerText = "Connected!";
                });
            });
        }
    </script>
</body>
</html>
