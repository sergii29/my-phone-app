<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Связь</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; padding: 20px; margin: 0; }
        .status-area { background: #1a1a1a; padding: 20px; border-radius: 15px; color: #0f0; margin-bottom: 20px; border: 2px solid #333; font-size: 1.2rem; }
        .btn-call { background: #28a745; width: 100%; padding: 35px; border-radius: 25px; font-size: 1.8rem; font-weight: bold; border: none; color: white; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-accept { background: #28a745; width: 100%; padding: 45px; border-radius: 25px; font-size: 2.5rem; border: none; color: white; }
        #incoming-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; padding-top: 80px; z-index: 9999; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2>СВЯЗЬ</h2>
        <div id="status" class="status-area">ПОДКЛЮЧЕНИЕ...<br><small style="color:#666; font-size:0.7rem;">Если висит долго - включи VPN</small></div>
        <div id="users-list">Ожидание мамы/сына...</div>
        <button style="margin-top:50px; background:none; border:1px solid #444; color:#666; padding:10px; border-radius:10px;" onclick="location.reload()">ОБНОВИТЬ</button>
    </div>

    <div id="incoming-screen">
        <h1 style="font-size: 3rem; color:#0f0;">ЗВОНОК!</h1>
        <button class="btn-accept" onclick="acceptCall()">ОТВЕТИТЬ</button>
    </div>

    <div id="active-call-ui" style="display:none;">
        <h1 style="color:#0f0; font-size:2.5rem;">ГОВОРИ!</h1>
        <button style="background:#d9534f; width:100%; padding:40px; border-radius:25px; color:white; font-size:2rem; border:none;" onclick="location.reload()">ЗАКОНЧИТЬ</button>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>
    <audio id="ringtone" loop><source src="https://www.soundjay.com/phone/phone-calling-1.mp3" type="audio/mpeg"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChrQMyO2soPgoEHq_f3aYs5Cs19q3sWEk",
            authDomain: "warszawa-courier.firebaseapp.com",
            databaseURL: "https://warszawa-courier-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "warszawa-courier",
            storageBucket: "warszawa-courier.firebasestorage.app",
            messagingSenderId: "295860613508",
            appId: "1:295860613508:web:86fe8364377d6875612dd1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = /iPhone|Android/i.test(navigator.userAgent) ? 'MAMA' : 'SYN';

        // Максимальный набор серверов для "пробития" Промтелекома
        const peer = new Peer(myId, {
            config: {'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun.l.google.com:19305' }, // Доп порт
                { urls: 'stun:stun.services.mozilla.com' },
                { urls: 'stun:stun.systweak.com' }
            ]}
        });

        const audioEl = document.getElementById('remoteAudio');
        const ringtone = document.getElementById('ringtone');
        let currentCall = null;

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Я В СЕТИ (ОК)";
            db.ref('online_calls/' + id).set({t: Date.now()});
            db.ref('online_calls/' + id).onDisconnect().remove();
        });

        db.ref('online_calls').on('value', (snapshot) => {
            const listDiv = document.getElementById('users-list');
            let html = '';
            snapshot.forEach((child) => {
                if (child.key !== myId) {
                    const label = (child.key === 'SYN') ? 'ПОЗВОНИТЬ СЫНУ' : 'ПОЗВОНИТЬ МАМЕ';
                    html += `<button class="btn-call" onclick="makeCall('${child.key}')">${label}</button>`;
                }
            });
            listDiv.innerHTML = html || "Второй еще не зашел...";
        });

        peer.on('call', (call) => {
            currentCall = call;
            ringtone.play().catch(() => {});
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('incoming-screen').style.display = 'block';
        });

        function acceptCall() {
            ringtone.pause();
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                currentCall.answer(stream);
                showActiveUI();
                currentCall.on('stream', s => { audioEl.srcObject = s; });
            });
        }

        function makeCall(tid) {
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                currentCall = peer.call(tid, stream);
                showActiveUI();
                currentCall.on('stream', s => { audioEl.srcObject = s; });
            });
        }

        function showActiveUI() { document.getElementById('main-ui').style.display='none'; document.getElementById('incoming-screen').style.display='none'; document.getElementById('active-call-ui').style.display='block'; }
    </script>
</body>
</html>
