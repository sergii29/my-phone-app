<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Warszawa Call</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; }
        
        /* Большая кнопка для мамы */
        .btn-call { background: #28a745; width: 100%; padding: 25px; border-radius: 20px; font-size: 1.5rem; font-weight: bold; border: none; color: white; margin-top: 20px; }
        .btn-hangup { background: #d9534f; width: 100%; padding: 25px; border-radius: 20px; font-size: 1.5rem; font-weight: bold; border: none; color: white; margin-top: 20px; }
        
        .btn-accept { background: #28a745; width: 100%; padding: 30px; border-radius: 20px; font-size: 1.8rem; border: none; color: white; margin-bottom: 15px; }
        .btn-decline { background: #555; width: 100%; padding: 20px; border-radius: 20px; font-size: 1.2rem; border: none; color: white; }

        #incoming-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; padding-top: 100px; z-index: 999; }
        .status-area { background: #111; padding: 15px; border-radius: 10px; color: #0f0; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body onclick="startAudio()">

    <div class="container">
        <div id="main-ui">
            <h2>СВЯЗЬ С СЫНОМ</h2>
            <div id="status" class="status-area">Нажми здесь один раз!</div>
            <div id="users-list">Поиск...</div>
        </div>

        <div id="incoming-screen">
            <h1 style="font-size: 2.5rem;">ТЕБЕ ЗВОНЯТ!</h1>
            <button class="btn-accept" onclick="acceptCall()">ОТВЕТИТЬ</button>
            <button class="btn-decline" onclick="declineCall()">СБРОСИТЬ</button>
        </div>

        <div id="active-call-ui" style="display:none;">
            <h2 id="call-timer">РАЗГОВОР...</h2>
            <button class="btn-hangup" onclick="endCall()">ПОЛОЖИТЬ ТРУБКУ</button>
        </div>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>
    <audio id="ringtone" loop>
        <source src="https://www.soundjay.com/phone/phone-calling-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChrQMyO2soPgoEHq_f3aYs5Cs19q3sWEk",
            authDomain: "warszawa-courier.firebaseapp.com",
            databaseURL: "https://warszawa-courier-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "warszawa-courier",
            storageBucket: "warszawa-courier.firebasestorage.app",
            messagingSenderId: "295860613508",
            appId: "1:295860613508:web:86fe8364377d6875612dd1",
            measurementId: "G-TGSCHBVLX2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = 'User-' + Math.floor(Math.random() * 9000);
        const peer = new Peer(myId);
        const audioEl = document.getElementById('remoteAudio');
        const ringtone = document.getElementById('ringtone');
        
        let currentCall = null;
        let incomingCallRequest = null;

        // Запрашиваем микрофон СРАЗУ, чтобы потом не тупило
        function startAudio() {
            navigator.mediaDevices.getUserMedia({audio: true}).then(s => {
                s.getTracks().forEach(t => t.stop()); // Просто проверили доступ
                document.getElementById('status').innerText = "ВСЁ ГОТОВО";
                ringtone.play().then(() => ringtone.pause()); // Разрешаем звук
            }).catch(() => {
                document.getElementById('status').innerText = "НАЖМИ 'РАЗРЕШИТЬ'!";
            });
        }

        peer.on('open', (id) => {
            const userRef = db.ref('online_calls/' + id);
            userRef.set(Date.now());
            userRef.onDisconnect().remove();
        });

        db.ref('online_calls').on('value', (snapshot) => {
            const listDiv = document.getElementById('users-list');
            listDiv.innerHTML = '';
            snapshot.forEach((child) => {
                const userId = child.key;
                if (userId !== myId) {
                    listDiv.innerHTML += `<button class="btn-call" onclick="makeCall('${userId}')">ПОЗВОНИТЬ</button>`;
                }
            });
        });

        peer.on('call', (call) => {
            incomingCallRequest = call;
            ringtone.play();
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('incoming-screen').style.display = 'block';
        });

        function acceptCall() {
            ringtone.pause();
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                incomingCallRequest.answer(stream);
                currentCall = incomingCallRequest;
                showActiveUI();
                currentCall.on('stream', s => { audioEl.srcObject = s; audioEl.play(); });
                currentCall.on('close', endCall);
            });
        }

        function declineCall() { ringtone.pause(); if(incomingCallRequest) incomingCallRequest.close(); resetUI(); }
        
        function makeCall(tid) {
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                currentCall = peer.call(tid, stream);
                showActiveUI();
                currentCall.on('stream', s => { audioEl.srcObject = s; audioEl.play(); });
                currentCall.on('close', endCall);
            });
        }

        function endCall() { if(currentCall) currentCall.close(); audioEl.srcObject = null; ringtone.pause(); resetUI(); }
        function showActiveUI() { 
            document.getElementById('main-ui').style.display = 'none'; 
            document.getElementById('incoming-screen').style.display = 'none'; 
            document.getElementById('active-call-ui').style.display = 'block'; 
        }
        function resetUI() { 
            document.getElementById('main-ui').style.display = 'block'; 
            document.getElementById('incoming-screen').style.display = 'none'; 
            document.getElementById('active-call-ui').style.display = 'none'; 
        }
    </script>
</body>
</html>
